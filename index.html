<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Grand Cerf – Alerte</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "92df196d-df7e-49bf-a9d5-ce548979b922",
      });
    });

    // 🔥 Forcer l’affichage du prompt d’abonnement
    OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.showSlidedownPrompt();
      } catch (e) {
        console.error("Erreur prompt OneSignal :", e);
      }
    });
  </script>
</head>
<body>
  <header>
    <h1>Grand Cerf – Alerte</h1>
  </header>

  <main>
    <section>
      <h2>Envoyer une alerte</h2>
      <form id="alert-form">
        <label for="message">Message d’alerte</label>
        <textarea id="message" name="message" rows="3">Test accident enfant accueil</textarea>
        <button type="submit">Envoyer l’alerte</button>
      </form>
    </section>

    <section>
      <h2>Historique des alertes</h2>
      <ul id="history"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
